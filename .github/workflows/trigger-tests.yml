name: Trigger Playwright Tests on Push

on:
  push:
    branches: [ main, master ]

jobs:
  ping-test-repo:
    runs-on: ubuntu-latest
    steps:
      - name: Send Dispatch Ping to Test Repo
        run: |
          curl -H "Authorization: token ${{ secrets.DISPATCH_TOKEN }}" \
               -H "Accept: application/vnd.github.v3+json" \
               -H "User-Agent: teguhhartono123-game-hub" \
               -X POST \
               -d '{"event_type": "run-playwright"}' \
               
